<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中學圖書館 | 每週新書速遞</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, getDoc, updateDoc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js";

        // ================= 您的 Firebase 配置 =================
        const firebaseConfig = {
            apiKey: "AIzaSyAdNZnrW2xEh6AYFs5osZ0Zi-Tl5ZPbqfs",
            authDomain: "newbookf-a73de-5a312-47013.firebaseapp.com",
            projectId: "newbookf-a73de-5a312-47013",
            storageBucket: "newbookf-a73de-5a312-47013.firebasestorage.app",
            messagingSenderId: "1022548977720",
            appId: "1:1022548977720:web:b713d061247b81b98d1ecd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.libraryData = {
            issues: {}, reserveRecords: [], recommendRecords: [],
            latestIssue: 1, allBooks: []
        };
        window.currentIssue = 1;
        window.clickedWantToRead = new Set();
        window.clickedLike = new Set();

        const placeholderImg = "data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='100' height='150' viewBox='0 0 100 150'%3E%3Crect width='100' height='150' fill='%23f5f5f7'/%3E%3Ctext x='50' y='75' font-family='sans-serif' font-size='14' fill='%238e8e93' text-anchor='middle' dominant-baseline='middle'%3E暫無封面%3C/text%3E%3C/svg%3E";

        // ================= UI 核心工具 =================
        window.showToast = function (message, type = "success") {
            const container = document.getElementById('toastContainer');
            if (!container) return;
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        window.closeAllModals = function () {
            document.querySelectorAll('.modal-overlay').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.bottom-sheet').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.modal-center').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.modal').forEach(el => { el.classList.add('hidden'); el.style.display = 'none'; });
            hideMobileBookDetail();
        }

        // ================= 資料載入 =================
        async function loadData() {
            try {
                const loader = document.getElementById('loadingIndicator');
                if (loader) loader.classList.add('active');

                const issuesSnap = await getDocs(collection(db, "issues"));
                window.libraryData.issues = {};
                issuesSnap.forEach(doc => window.libraryData.issues[doc.id] = doc.data());

                const reservesSnap = await getDocs(collection(db, "reserves"));
                window.libraryData.reserveRecords = [];
                reservesSnap.forEach(doc => window.libraryData.reserveRecords.push({ ...doc.data(), id: doc.id }));

                const recommendsSnap = await getDocs(collection(db, "recommends"));
                window.libraryData.recommendRecords = [];
                recommendsSnap.forEach(doc => window.libraryData.recommendRecords.push({ ...doc.data(), id: doc.id }));

                const settingsDoc = await getDoc(doc(db, "settings", "system"));
                window.libraryData.latestIssue = settingsDoc.exists() ? settingsDoc.data().latestIssue : 1;

                const likesSnap = await getDocs(collection(db, "bookLikes"));
                window.libraryData.bookLikes = {};
                likesSnap.forEach(doc => window.libraryData.bookLikes[doc.id] = doc.data().count || 0);

                const commentsSnap = await getDocs(collection(db, "bookComments"));
                window.libraryData.bookComments = {};
                commentsSnap.forEach(doc => {
                    const data = doc.data();
                    if (!window.libraryData.bookComments[data.bookId]) window.libraryData.bookComments[data.bookId] = [];
                    window.libraryData.bookComments[data.bookId].push({
                        id: doc.id, content: data.content, likeCount: data.likeCount || 0,
                        isTop: data.isTop || false, time: data.time || new Date().toLocaleString()
                    });
                });

                for (const issueId in window.libraryData.issues) {
                    let issueChanged = false;
                    for (const posterId in window.libraryData.issues[issueId].books) {
                        for (const bookNum in window.libraryData.issues[issueId].books[posterId]) {
                            const book = window.libraryData.issues[issueId].books[posterId][bookNum];
                            const fullBookId = `issue-${issueId}-poster-${posterId}-book-${bookNum}`;

                            if (book.status === 'reserved') {
                                const hasReserve = window.libraryData.reserveRecords.some(r => r.bookId === fullBookId && (r.status === '已預約' || r.status === '處理中'));
                                if (!hasReserve) {
                                    book.status = 'in';
                                    issueChanged = true;
                                }
                            }
                        }
                    }
                    if (issueChanged) {
                        await setDoc(doc(db, "issues", issueId), window.libraryData.issues[issueId]);
                    }
                }

                collectAllBooks();
                initUI();
                await loadAnnouncement();
                if (loader) loader.classList.remove('active');
            } catch (err) {
                console.error("載入失敗:", err);
                showToast("資料載入失敗，請重新整理頁面", "error");
                const loader = document.getElementById('loadingIndicator');
                if (loader) loader.classList.remove('active');
            }
        }

        function collectAllBooks() {
            window.libraryData.allBooks = [];
            for (const issue in window.libraryData.issues) {
                const issueData = window.libraryData.issues[issue];
                for (const poster in issueData.books) {
                    const posterBooks = issueData.books[poster];
                    for (const bookNum in posterBooks) {
                        const book = { ...posterBooks[bookNum] };
                        book.id = `issue-${issue}-poster-${poster}-book-${bookNum}`;
                        book.issue = issue; book.posterNum = poster; book.bookNum = bookNum;
                        window.libraryData.allBooks.push(book);
                    }
                }
            }
        }

        async function saveData() {
            try {
                for (const issueId in window.libraryData.issues) {
                    await setDoc(doc(db, "issues", issueId), window.libraryData.issues[issueId]);
                }
                await setDoc(doc(db, "settings", "system"), { latestIssue: window.libraryData.latestIssue });
                for (const bookId in window.libraryData.bookLikes) {
                    await setDoc(doc(db, "bookLikes", bookId), { count: window.libraryData.bookLikes[bookId] || 0 });
                }
                const allComments = [];
                for (const bookId in window.libraryData.bookComments) {
                    window.libraryData.bookComments[bookId].forEach(comment => allComments.push({ ...comment, bookId }));
                }
                const commentsCol = collection(db, "bookComments");
                const oldSnap = await getDocs(commentsCol);
                oldSnap.forEach(async (d) => { await deleteDoc(d.ref); });
                for (const comment of allComments) {
                    if (comment.id) { await setDoc(doc(db, "bookComments", comment.id), comment); }
                    else { const newRef = doc(collection(db, "bookComments")); await setDoc(newRef, { ...comment, id: newRef.id }); }
                }
                collectAllBooks();
            } catch (err) { showToast("儲存失敗", "error"); }
        }

        function initUI() {
            renderIssueSelectors();
            switchIssue(window.libraryData.latestIssue);
            mobileSwitchIssue(window.libraryData.latestIssue);
            initCarousel();
            renderRecommendList();
            renderRankingList();
            setupSearchDebounce();

            const biSel = document.getElementById('bookIssueSelect');
            const bpSel = document.getElementById('bookPosterSelect');
            const bnSel = document.getElementById('bookNumSelect');
            if (biSel) biSel.addEventListener('change', loadBookData);
            if (bpSel) bpSel.addEventListener('change', loadBookData);
            if (bnSel) bnSel.addEventListener('change', loadBookData);
        }

        // ================= 公告邏輯 =================
        async function loadAnnouncement() {
            try {
                const docSnap = await getDoc(doc(db, "settings", "announcement"));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.title && data.content) {
                        document.getElementById('announcementTitle').textContent = data.title;
                        document.getElementById('announcementContent').innerHTML = data.content.replace(/\n/g, '<br>');

                        const modal = document.getElementById('announcementModal');
                        if (modal) {
                            modal.classList.remove('hidden');
                            modal.style.display = 'flex';
                        }

                        const tInput = document.getElementById('announcementTitleInput');
                        const cInput = document.getElementById('announcementContentInput');
                        if (tInput) tInput.value = data.title;
                        if (cInput) cInput.value = data.content;
                    }
                }
            } catch (err) { console.error("加載公告失敗:", err); }
        }

        window.closeAnnouncement = function () {
            const modal = document.getElementById('announcementModal');
            if (modal) {
                modal.classList.add('hidden');
                modal.style.display = 'none';
            }
        }

        // ================= 防呆下拉選單生成 =================
        function renderIssueSelectors() {
            const issues = Object.keys(window.libraryData.issues).map(Number).sort((a, b) => a - b);
            let optionsHtml = '';
            issues.forEach(issue => {
                optionsHtml += `<option value="${issue}">第${issue}期</option>`;
            });

            const selectorIds = ['issueSelect', 'mobileIssueSelect', 'bookIssueSelect', 'deleteIssueSelect'];
            selectorIds.forEach(id => {
                const sel = document.getElementById(id);
                if (sel) {
                    sel.innerHTML = optionsHtml;
                    if (id !== 'deleteIssueSelect') {
                        sel.value = window.libraryData.latestIssue;
                    }
                }
            });
        }

        // ================= 電腦版與共用切換邏輯 =================
        window.switchIssue = function (issue) {
            window.currentIssue = Number(issue);
            const sel = document.getElementById('issueSelect');
            if (sel) sel.value = window.currentIssue;
            document.querySelectorAll('.desktop-poster-btn').forEach(btn => btn.classList.remove('active'));
            const firstBtn = document.querySelector('.desktop-poster-btn[data-poster="1"]');
            if (firstBtn) firstBtn.classList.add('active');
            renderBooks(window.currentIssue, 1);
            showSection('homeSection');
        }

        window.jumpToIssue = function (issue, posterNum) {
            closeAllModals();
            switchIssue(issue);
            const btn = document.querySelector(`.desktop-poster-btn[data-poster="${posterNum}"]`);
            if (btn) setActivePoster(btn, posterNum);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.mobileJumpToIssue = function (issue, posterNum) {
            closeAllModals();
            mobileSwitchIssue(issue);
            const btn = document.querySelector(`.mobile-poster-btn[data-poster="${posterNum}"]`);
            if (btn) setMobileActivePoster(btn, posterNum);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.filterByCategory = function (category, element) {
            document.querySelectorAll('.pill.desktop-pill').forEach(el => el.classList.remove('active'));
            if (element) element.classList.add('active');

            const container = document.getElementById('booksGrid');
            if (!container) return;
            container.innerHTML = '';
            const controls = document.getElementById('posterControls');
            if (controls) controls.style.display = 'none';

            const filtered = category === 'all' ? window.libraryData.allBooks : window.libraryData.allBooks.filter(b => b.classCode === category);
            filtered.forEach(book => container.appendChild(createBookCard(book)));
            showSection('homeSection');
        }

        function createBookCard(book) {
            const card = document.createElement('div');
            card.className = 'book-card';
            const likeCount = window.libraryData.bookLikes[book.id] || 0;
            const imgSrc = book.cover || placeholderImg;
            let statusBadge = book.status === 'in' ? '<span class="status-badge status-in">可預約</span>' :
                (book.status === 'out' ? '<span class="status-badge status-out">不在架</span>' : '<span class="status-badge status-reserved">已被預約</span>');

            card.innerHTML = `
                <div class="book-cover-wrapper" onclick="showDesktopBookDetail('${book.id}')">
                    <img src="${imgSrc}" class="book-cover" onerror="this.src='${placeholderImg}'">
                    ${statusBadge}
                </div>
                <div class="book-info">
                    <h3 class="book-title" onclick="showDesktopBookDetail('${book.id}')">${book.title}</h3>
                    <div class="book-meta"><span class="author">${book.author || '待編輯'}</span></div>
                    <div class="book-actions">
                        <button class="action-btn like-btn-element" data-book-id="${book.id}" onclick="bookLike('${book.id}', event)">
                            ${likeCount > 0 ? '❤️' : '🤍'} <span>${likeCount}</span>
                        </button>
                        <button class="action-btn" onclick="openCommentModal('${book.id}', event)">💬</button>
                    </div>
                </div>
            `;
            if (likeCount > 0) {
                card.querySelector('.like-btn-element').classList.add('liked');
            }
            return card;
        }

        window.renderBooks = function (issue, posterNum) {
            const container = document.getElementById('booksGrid');
            if (!container) return;
            container.innerHTML = '';
            const controls = document.getElementById('posterControls');
            if (controls) controls.style.display = 'flex';

            if (!window.libraryData.issues[issue] || !window.libraryData.issues[issue].books[posterNum]) return;
            const books = window.libraryData.issues[issue].books[posterNum];

            for (let i = 1; i <= 9; i++) {
                if (books[i]) container.appendChild(createBookCard(books[i]));
            }
        }

        window.setActivePoster = function (btn, posterNum) {
            if (!btn) return;
            document.querySelectorAll('.desktop-poster-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderBooks(window.currentIssue, posterNum);
        }

        window.showSection = function (sectionId) {
            document.querySelectorAll('.main-section').forEach(sec => sec.classList.remove('active'));
            const sec = document.getElementById(sectionId);
            if (sec) sec.classList.add('active');
        }

        // ================= 無縫巡迴展示欄 =================
        function initCarousel() {
            const track = document.getElementById('carouselTrack');
            if (!track) return;
            track.innerHTML = '';
            let books = window.libraryData.allBooks.filter(b => b.cover && b.cover.trim() !== '');
            if (books.length === 0) return;

            books = books.sort(() => 0.5 - Math.random()).slice(0, 20);

            const createItem = (book) => {
                const div = document.createElement('div');
                div.className = 'carousel-item';
                div.innerHTML = `<img src="${book.cover}" onerror="this.src='${placeholderImg}'">`;
                div.onclick = () => showDesktopBookDetail(book.id);
                return div;
            };

            books.forEach(b => track.appendChild(createItem(b)));
            books.forEach(b => track.appendChild(createItem(b)));
        }

        // ================= 書籍詳情與預約 =================
        window.showDesktopBookDetail = function (bookId) {
            const book = window.libraryData.allBooks.find(b => b.id === bookId);
            if (!book) return;

            let statusHtml = book.status === 'in'
                ? `<span style="color:var(--success)">在架 (可預約)</span>`
                : (book.status === 'out' ? `<span style="color:var(--text-light)">不在架</span>` : `<span style="color:var(--danger)">已被預約</span>`);

            let reserveBtn = book.status === 'in' ? `<button class="btn-primary" onclick="openReserveModal('${book.id}')" style="width:100%; margin-top:15px; border-radius:16px;">立即預約</button>` : '';
            let jumpBtn = `<button style="width:100%; margin-top:10px; border-radius:16px; padding:12px; background:var(--bg); border:1.5px solid var(--border); color:var(--text); font-weight:bold; cursor:pointer;" onclick="jumpToIssue('${book.issue}', '${book.posterNum}')">前往第 ${book.issue} 期書單</button>`;

            document.getElementById('dbsCover').src = book.cover || placeholderImg;
            document.getElementById('dbsTitle').textContent = book.title;
            document.getElementById('dbsAuthor').textContent = `作者：${book.author || '待編輯'}`;
            document.getElementById('dbsCallNo').textContent = `索書號：${book.callNo || '待編輯'}`;
            document.getElementById('dbsSuitable').textContent = `適合：${book.suitable || '待編輯'}`;
            document.getElementById('dbsStatus').innerHTML = `狀態：${statusHtml}`;
            document.getElementById('dbsIntro').textContent = book.intro || '暫無簡介';
            document.getElementById('dbsReserveContainer').innerHTML = reserveBtn + jumpBtn;

            document.getElementById('modalOverlay').classList.add('active');
            document.getElementById('desktopBookDetailSheet').classList.add('active');
        }

        window.openReserveModal = function (bookId) {
            closeAllModals();
            const book = window.libraryData.allBooks.find(b => b.id === bookId);
            if (!book) return;

            document.getElementById('reserveBookTitle').textContent = book.title;
            document.getElementById('reserveBookId').value = bookId;

            const classInput = document.getElementById('reserveClass');
            const nameInput = document.getElementById('reserveName');
            classInput.value = localStorage.getItem('lib_className') || '';
            nameInput.value = localStorage.getItem('lib_studentName') || '';
            classInput.classList.remove('error');
            nameInput.classList.remove('error');

            setTimeout(() => {
                document.getElementById('modalOverlay').classList.add('active');
                document.getElementById('reserveModal').classList.add('active');
            }, 300);
        }

        window.submitReserve = function () {
            const bookId = document.getElementById('reserveBookId').value;
            const book = window.libraryData.allBooks.find(b => b.id === bookId);
            const classInput = document.getElementById('reserveClass');
            const nameInput = document.getElementById('reserveName');
            const className = classInput.value.trim();
            const studentName = nameInput.value.trim();

            if (!className) { classInput.classList.add('error'); return; } else { classInput.classList.remove('error'); }
            if (!studentName) { nameInput.classList.add('error'); return; } else { nameInput.classList.remove('error'); }

            localStorage.setItem('lib_className', className);
            localStorage.setItem('lib_studentName', studentName);

            const record = {
                bookId, bookTitle: book.title, className, studentName,
                time: new Date().toLocaleString(), status: '已預約'
            };

            window.saveReserveRecord(record);
            closeAllModals();
            showToast('預約成功！請於2天內至櫃檯取書。', 'success');
        }

        window.saveReserveRecord = async function (record) {
            try {
                const recordRef = doc(collection(db, "reserves"));
                await setDoc(recordRef, record);
                window.libraryData.reserveRecords.push({ ...record, id: recordRef.id });
                const [_, issue, __, poster, ___, bookNum] = record.bookId.split('-');
                if (window.libraryData.issues[issue]?.books[poster]?.[bookNum]) {
                    window.libraryData.issues[issue].books[poster][bookNum].status = 'reserved';
                    await saveData();
                    renderBooks(window.currentIssue, document.querySelector('.desktop-poster-btn.active')?.dataset.poster || 1);
                    mobileRenderBooks(window.currentIssue, document.querySelector('.mobile-poster-btn.active')?.dataset.poster || 1);
                    if (typeof renderReserveRecords === 'function') renderReserveRecords();
                }
            } catch (err) { showToast("預約失敗", "error"); }
        }

        // ================= 點讚與留言 =================
        window.bookLike = async function (bookId, event) {
            event.stopPropagation();
            if (window.clickedLike.has(bookId)) {
                showToast('您已經按過讚囉！', 'success');
                return;
            }
            window.clickedLike.add(bookId);

            if (!window.libraryData.bookLikes[bookId]) window.libraryData.bookLikes[bookId] = 0;
            window.libraryData.bookLikes[bookId] += 1;

            const btns = document.querySelectorAll(`.like-btn-element[data-book-id="${bookId}"]`);
            btns.forEach(btn => {
                btn.innerHTML = `❤️ <span>${window.libraryData.bookLikes[bookId]}</span>`;
                btn.classList.add('liked');
                btn.style.transform = 'scale(1.2)';
                setTimeout(() => btn.style.transform = 'scale(1)', 200);
            });
            await setDoc(doc(db, "bookLikes", bookId), { count: window.libraryData.bookLikes[bookId] });
        }

        window.openCommentModal = function (bookId, event) {
            if (event) event.stopPropagation();
            closeAllModals();
            const book = window.libraryData.allBooks.find(b => b.id === bookId);
            document.getElementById('commentBookTitle').textContent = book.title;
            document.getElementById('commentBookId').value = bookId;
            loadComments(bookId);

            setTimeout(() => {
                document.getElementById('modalOverlay').classList.add('active');
                document.getElementById('commentSheet').classList.add('active');
            }, 100);
        }

        function loadComments(bookId) {
            const list = document.getElementById('commentList');
            if (!list) return;
            list.innerHTML = '';
            let comments = window.libraryData.bookComments[bookId] || [];
            comments.sort((a, b) => (b.isTop - a.isTop) || (b.likeCount - a.likeCount));

            if (comments.length === 0) {
                list.innerHTML = '<div style="text-align:center; color:var(--text-light); padding:20px;">快來搶頭香留言！</div>';
                return;
            }

            comments.forEach(c => {
                const topTag = c.isTop ? '<span class="tag-top">置頂</span>' : '';
                list.innerHTML += `
                    <div class="comment-item">
                        ${topTag}
                        <div class="comment-text">${c.content}</div>
                        <div class="comment-footer">
                            <span>${c.time}</span>
                            <button onclick="likeComment('${bookId}', '${c.id}', this)">❤️ ${c.likeCount}</button>
                        </div>
                    </div>
                `;
            });
        }

        window.submitComment = async function () {
            const bookId = document.getElementById('commentBookId').value;
            const input = document.getElementById('commentInput');
            if (!input.value.trim()) { showToast('請輸入留言', 'error'); return; }

            const newComment = { id: 'c_' + Date.now(), content: input.value.trim(), likeCount: 0, isTop: false, time: new Date().toLocaleString() };
            if (!window.libraryData.bookComments[bookId]) window.libraryData.bookComments[bookId] = [];
            window.libraryData.bookComments[bookId].push(newComment);
            await saveData();
            input.value = '';
            loadComments(bookId);
            showToast('留言發佈成功！');
        }

        window.likeComment = async function (bookId, commentId, btn) {
            const comment = window.libraryData.bookComments[bookId].find(c => c.id === commentId);
            if (comment) {
                comment.likeCount++;
                btn.innerHTML = `❤️ ${comment.likeCount}`;
                await saveData();
            }
        }

        // ================= 搜尋與推薦 =================
        let searchTimeout;
        window.setupSearchDebounce = function () {
            const inputs = [document.getElementById('searchInput'), document.getElementById('mobileSearchInput')];
            inputs.forEach(input => {
                if (!input) return;
                input.addEventListener('input', (e) => {
                    clearTimeout(searchTimeout);
                    const keyword = e.target.value.trim();
                    searchTimeout = setTimeout(() => { executeSearch(keyword.toLowerCase()); }, 500);
                });
            });
        }

        function executeSearch(keyword) {
            const desktopContainer = document.getElementById('booksGrid');
            const mobileContainer = document.getElementById('mobileBooksGrid');
            if (desktopContainer) desktopContainer.innerHTML = '';
            if (mobileContainer) mobileContainer.innerHTML = '';

            if (!keyword) {
                if (document.getElementById('posterControls')) document.getElementById('posterControls').style.display = 'flex';
                if (document.getElementById('mobilePosterControls')) document.getElementById('mobilePosterControls').style.display = 'flex';
                renderBooks(window.currentIssue, document.querySelector('.desktop-poster-btn.active')?.dataset.poster || 1);
                mobileRenderBooks(window.currentIssue, document.querySelector('.mobile-poster-btn.active')?.dataset.poster || 1);
                return;
            }

            if (document.getElementById('posterControls')) document.getElementById('posterControls').style.display = 'none';
            if (document.getElementById('mobilePosterControls')) document.getElementById('mobilePosterControls').style.display = 'none';

            const matched = window.libraryData.allBooks.filter(b =>
                (b.title && b.title.toLowerCase().includes(keyword)) ||
                (b.author && b.author.toLowerCase().includes(keyword)) ||
                (b.callNo && b.callNo.toLowerCase().includes(keyword))
            );

            if (matched.length === 0) {
                if (desktopContainer) desktopContainer.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding:40px; color:var(--text-light);">找不到相關書籍</div>';

        // ================= 手機版：Apple Books 風格左右滑動卡片 =================
        window.showMobileBookDetail = function (bookId) {
            const book = window.libraryData.allBooks.find(b => b.id === bookId);
            if (!book) return;

            // 1. 獲取當前網格中顯示的所有書籍 IDs (確保滑動時能看到同樣順序的書)
            const currentCards = document.querySelectorAll('#mobileBooksGrid .book-card, .list-card');
            let bookIds = [];
            currentCards.forEach(card => {
                if (card.dataset.id) {
                    bookIds.push(card.dataset.id);
                } else if (card.getAttribute('onclick')) {
                    const match = card.getAttribute('onclick').match(/'([^']+)'/);
                    if (match) bookIds.push(match[1]);
                }
            });

            bookIds = [...new Set(bookIds)];
            if (bookIds.length === 0) bookIds = [bookId];
            if (!bookIds.includes(bookId)) bookIds.unshift(bookId);

            const swiper = document.getElementById('mobileDetailSwiper');
            swiper.innerHTML = '';

            // 2. 根據 IDs 建立所有的 Slide 卡片
            bookIds.forEach((id) => {
                const b = window.libraryData.allBooks.find(item => item.id === id);
                if (!b) return;

                let statusHtml = b.status === 'in'
                    ? `<span style="color:var(--success)">在架 (可預約)</span>`
                    : (b.status === 'out' ? `<span style="color:var(--text-light)">不在架</span>` : `<span style="color:var(--danger)">已被預約</span>`);

                let reserveBtn = b.status === 'in' ? `<button class="btn-primary" onclick="openReserveModal('${b.id}')" style="width:100%; margin-top:15px; border-radius:16px;">立即預約</button>` : '';

                // 外層 slide 容器 (100vw寬度，用於 snap 排列)
                const slide = document.createElement('div');
                slide.className = 'mobile-detail-slide';
                slide.id = `mobile-slide-${b.id}`;

                // 內層實際的卡片內容區
                const card = document.createElement('div');
                card.className = 'mobile-detail-card';

                card.innerHTML = `
                    <div style="padding: 0 0 20px; text-align: center;">
                        <img src="${b.cover || placeholderImg}" style="width: 140px; height: 210px; object-fit: cover; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin: 0 auto 20px; display: block;" onerror="this.src='${placeholderImg}'">
                        <h2 style="font-size: 22px; line-height: 1.3; margin-bottom: 8px; color: var(--text);">${b.title}</h2>
                        <p style="color: var(--text-light); font-size: 16px; margin-bottom: 4px;">作者：${b.author || '待編輯'}</p>
                        <p style="font-weight:600; margin-top:4px;">狀態：${statusHtml}</p>
                    </div>
                    <div style="padding: 10px 0; font-size: 15px; line-height: 1.6; color: var(--text);">
                        <div style="background: var(--bg); padding: 16px; border-radius: var(--radius-md);">
                            <p style="margin-bottom:12px;"><strong>簡介：</strong><br>${b.intro || '暫無簡介'}</p>
                            <div style="color:var(--text-light); font-size:14px; border-top:1px solid var(--border); padding-top:12px;">
                                <p style="margin-bottom:4px;">索書號：${b.callNo || '待編輯'}</p>
                                <p>適合：${b.suitable || '待編輯'}</p>
                            </div>
                        </div>
                    </div>
                    <div style="padding: 10px 0 40px;">
                        ${reserveBtn}
                        <button style="width:100%; margin-top:10px; border-radius:16px; padding:12px; background:var(--bg); border:1.5px solid var(--border); color:var(--text); font-weight:bold; cursor:pointer;" onclick="mobileJumpToIssue('${b.issue}', '${b.posterNum}')">前往第 ${b.issue} 期書單</button>
                    </div>
                `;

                // --- 核心交互：向下滾動、左右鎖定、下拉關閉 ---
                let startY = 0;
                let currentY = 0;

                // 1. 滾動超過一點點，就鎖定左右滑動
                card.addEventListener('scroll', function (e) {
                    if (this.scrollTop > 5) {
                        swiper.style.overflowX = 'hidden';
                    } else {
                        swiper.style.overflowX = 'auto';
                    }
                });

                // 2. 觸控開始，記錄位置並移除彈性動畫以便跟手
                card.addEventListener('touchstart', function (e) {
                    startY = e.touches[0].clientY;
                    currentY = startY;
                    this.style.transition = 'none';
                }, { passive: true });

                // 3. 拖曳中：如果在頂部且往下拖，就讓卡片往下走
                card.addEventListener('touchmove', function (e) {
                    currentY = e.touches[0].clientY;
                    const deltaY = currentY - startY;

                    // 當在最頂部，且手指向下滑動（deltaY > 0 為往下拖曳）
                    if (this.scrollTop <= 0 && deltaY > 0) {
                        this.style.transform = `translateY(${deltaY}px)`;
                        if (e.cancelable) e.preventDefault(); // 阻擋原生的下拉刷新
                    }
                }, { passive: false });

                // 4. 觸控結束：判斷是否拉夠遠來關閉，否則彈回原位
                card.addEventListener('touchend', function (e) {
                    const deltaY = currentY - startY;
                    this.style.transition = 'transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1)'; // 恢復滑動動畫

                    if (this.scrollTop <= 0 && deltaY > 100) { // 下拉超過 100px 則關閉
                        hideMobileBookDetail();
                        setTimeout(() => {
                            this.style.transform = 'translateY(0)'; // 在背景彈回原位
                        }, 400);
                    } else {
                        this.style.transform = 'translateY(0)'; // 拉不夠遠，彈回原位
                    }
                });

                slide.appendChild(card);
                swiper.appendChild(slide);
            });

            // 3. 顯示 Wrapper
            const wrapper = document.getElementById('mobileBookDetailWrapper');
            wrapper.classList.add('active');
            swiper.style.overflowX = 'auto'; // 確保初始可左右滑

            // 4. 瞬間定位到使用者點擊的那本書
            setTimeout(() => {
                const targetSlide = document.getElementById(`mobile-slide-${bookId}`);
                if (targetSlide) {
                    swiper.style.scrollBehavior = 'auto';
                    swiper.scrollLeft = targetSlide.offsetLeft;

                    // 延遲後恢復平滑滾動（供手動切換時使用）
                    setTimeout(() => {
                        swiper.style.scrollBehavior = 'smooth';
                    }, 50);
                }
            }, 10);
        }

            const issue = document.getElementById('bookIssueSelect').value;
            const posterNum = document.getElementById('bookPosterSelect').value;

            if (!window.libraryData.issues[issue].books[posterNum]) window.libraryData.issues[issue].books[posterNum] = {};

            let coverUrl = window.libraryData.issues[issue].books[posterNum][bookNum]?.cover || '';
            const coverFile = document.getElementById('bookCoverUpload').files[0];

            if (coverFile) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    coverUrl = e.target.result;
                    execSaveBook(coverUrl);

                reader.readAsDataURL(coverFile);
            } else {
                execSaveBook(coverUrl);
            }

            function execSaveBook(cover) {
                window.libraryData.issues[issue].books[posterNum][bookNum] = {
                    callNo: document.getElementById('bookCallNo').value,
                    title: title, classCode: document.getElementById('bookClassCode').value,
                    author: document.getElementById('bookAuthor').value, intro: document.getElementById('bookIntro').value,

                mobileRenderBooks(issue, posterNum);
                showToast('書籍儲存成功', 'success');
                document.getElementById('bookCoverUpload').value = '';

        window.updateReserveStatus = async function (id, status) {
            try {
                const record = window.libraryData.reserveRecords.find(r => r.id === id);
                if (!record) return;
                record.status = status;
                await updateDoc(doc(db, "reserves", record.id), { status });

                const idParts = record.bookId.split('-');
                const issue = idParts[1]; const poster = idParts[3]; const bookNum = idParts[5];
                if (window.libraryData.issues[issue]?.books[poster]?.[bookNum]) {
                    let bookStatus = (status === '已還書' || status === '找不到') ? 'in' : (status === '借走了' ? 'out' : 'reserved');
                    window.libraryData.issues[issue].books[poster][bookNum].status = bookStatus;
                    await saveData();
                    renderBooks(window.currentIssue, document.querySelector('.desktop-poster-btn.active')?.dataset.poster || 1);
                    mobileRenderBooks(window.currentIssue, document.querySelector('.mobile-poster-btn.active')?.dataset.poster || 1);

            if (!container) return;
            container.innerHTML = '';
            const sorted = [...window.libraryData.recommendRecords].sort((a, b) => new Date(b.time) - new Date(a.time));
            if (sorted.length === 0) { container.innerHTML = '<p>暫無推薦記錄</p>'; return; }
            sorted.forEach((r, i) => {
                container.innerHTML += `
                    <div class="record-item">
                        <div>${r.time} | 書名: ${r.bookName} | 理由: ${r.reason}</div>
                        <select onchange="updateRecommendStatus('${r.id}', this.value)">
                            <option ${r.status === '已推薦' ? 'selected' : ''}>推薦中</option>
                            <option ${r.status === '已記錄' ? 'selected' : ''}>已記錄</option>
                            <option ${r.status === '不合規定' ? 'selected' : ''}>不合規定</option>
                        </select>
                    </div>`;
            });
        }

        window.updateRecommendStatus = async function (id, status) {
            try {
                const record = window.libraryData.recommendRecords.find(r => r.id === id);
                if (!record) return;
                record.status = status;
                await updateDoc(doc(db, "recommends", record.id), { status });
                renderRecommendAdminRecords();
                renderRecommendList();
            } catch (err) { showToast("更新失敗", "error"); }
        }

        window.loadAllComments = function () {
            const adminCommentList = document.getElementById('adminCommentList');
            if (!adminCommentList) return;
            adminCommentList.innerHTML = '';
            const allComments = [];
            for (const bookId in window.libraryData.bookComments) {
                const book = window.libraryData.allBooks.find(b => b.id === bookId);
                const bookTitle = book ? book.title : '未知書籍';
                window.libraryData.bookComments[bookId].forEach(comment => {
                    allComments.push({ ...comment, bookId: bookId, bookTitle: bookTitle });
                });
            }
            if (allComments.length === 0) { adminCommentList.innerHTML = '<p>暫無留言記錄</p>'; return; }
            allComments.sort((a, b) => new Date(b.time) - new Date(a.time)).forEach(comment => {
                const topChecked = comment.isTop ? 'checked' : '';
                adminCommentList.innerHTML += `
                    <div class="record-item">
                        <div><strong>${comment.bookTitle}</strong> | ${comment.content} <br><span style="color:var(--text-light); font-size:12px;">點讚: ${comment.likeCount} | 時間: ${comment.time}</span></div>
                        <div style="display:flex; gap:10px; align-items:center;">
                            <label>置頂: <input type="checkbox" ${topChecked} onchange="toggleCommentTop('${comment.bookId}', '${comment.id}', this.checked)"></label>
                            <button class="btn-danger" style="padding:6px 12px; font-size:12px;" onclick="deleteComment('${comment.bookId}', '${comment.id}')">刪除</button>
                        </div>
                    </div>`;
            });
        }

        window.toggleCommentTop = async function (bookId, commentId, isTop) {
            const comments = window.libraryData.bookComments[bookId] || [];
            const comment = comments.find(c => c.id === commentId);
            if (comment) {
                comment.isTop = isTop;
                await saveData();
                loadAllComments();
            }
        }

        window.deleteComment = async function (bookId, commentId) {
            if (!confirm('確定要刪除此留言嗎？')) return;
            window.libraryData.bookComments[bookId] = window.libraryData.bookComments[bookId].filter(c => c.id !== commentId);
            try { await deleteDoc(doc(db, "bookComments", commentId)); } catch (err) { console.error(err); }
            await saveData();
            loadAllComments();
            showToast('留言已刪除', 'success');
        }

        window.saveAnnouncement = async function () {
            const title = document.getElementById('announcementTitleInput').value.trim();
            const content = document.getElementById('announcementContentInput').value.trim();
            if (!title || !content) { showToast('請輸入公告標題和內容！', 'error'); return; }
            try {
                await setDoc(doc(db, "settings", "announcement"), { title, content, createTime: new Date().toLocaleString() });
                showToast('公告保存成功！', 'success');
                loadAnnouncement();
            } catch (err) { showToast('保存公告失敗', 'error'); }
        }

        window.deleteAnnouncement = async function () {
            if (!confirm('確定要刪除公告嗎？')) return;
            try {
                await deleteDoc(doc(db, "settings", "announcement"));
                document.getElementById('announcementTitleInput').value = '';
                document.getElementById('announcementContentInput').value = '';
                showToast('公告已刪除！', 'success');
            } catch (err) { showToast('刪除公告失敗', 'error'); }
        }

        window.onload = loadData;

            font-weight: 500;
            font-size: 14px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            animation: slideDown 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .toast-success {
            background: rgba(52, 199, 89, 0.95);
            backdrop-filter: blur(10px);
        }

        .toast-error {
            background: rgba(255, 59, 48, 0.95);
            backdrop-filter: blur(10px);
        }

        @keyframes slideDown {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            z-index: 19999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* 初始化隱藏，確保不擋住點擊 */
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .loading-overlay.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            /* 載入中擋住點擊 */
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--bg);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        /* 隱藏的管理員入口 */
        .hidden-admin-entry {
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-size: 12px;
            cursor: pointer;
            opacity: 0.3;
            z-index: 9999;
            width: 40px;
            height: 40px;
            background: #f5f5f7;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ================= 手機版：Apple Books 風格滑動書卡樣式 ================= */
        .mobile-detail-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2500;
            display: none;
        }

        .mobile-detail-wrapper.active {
            display: block;
        }

        .mobile-detail-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            opacity: 0;
            transition: opacity 0.4s;
        }

        .mobile-detail-wrapper.active .mobile-detail-bg {
            opacity: 1;
        }

        .mobile-detail-close {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 50%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            z-index: 2505;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.4s;
        }

        .mobile-detail-wrapper.active .mobile-detail-close {
            opacity: 1;
        }

        .mobile-detail-swiper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            z-index: 2501;
            scroll-behavior: smooth;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .mobile-detail-wrapper.active .mobile-detail-swiper {
            transform: translateY(0);
        }

        .mobile-detail-swiper::-webkit-scrollbar {
            display: none;
        }

        .mobile-detail-slide {
            width: 100vw;
            height: 100%;
            flex-shrink: 0;
            scroll-snap-align: start;
            display: flex;
            align-items: flex-end;
            opacity: 1;
            transform: none;
        }

        .mobile-detail-card {
            width: 100vw;
            height: calc(100% - 70px);
            background: var(--surface);
            border-radius: 20px 20px 0 0;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 24px;
            padding-bottom: calc(24px + env(safe-area-inset-bottom));
            will-change: transform;
            /* 優化拖曳時的渲染效能 */
        }

        .mobile-detail-card::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

<body>
    <div id="toastContainer" class="toast-container"></div>
    <div id="loadingIndicator" class="loading-overlay">
        <div class="spinner"></div>
        <p style="color:var(--primary); font-weight:500;">圖書館資料同步中...</p>
    </div>
    <div class="modal-overlay" id="modalOverlay" onclick="closeAllModals()"></div>

    <div class="modal hidden" id="announcementModal" style="z-index: 10000;">
        <div class="modal-content" style="max-width: 500px;">
            <h3 id="announcementTitle" style="margin-bottom: 20px; color: #1d1d1f; font-size: 1.3em;"></h3>
            <div id="announcementContent" style="margin-bottom: 30px; line-height: 1.6; color: #1d1d1f;"></div>
            <button class="btn-primary" onclick="closeAnnouncement()"
                style="width: 100%; padding: 10px; font-size: 1em;">知道了</button>
        </div>
    </div>

    <div class="desktop-content">
        <div class="header-container">
            <h1 class="main-title">中學圖書館 | 新書速遞</h1>
            <div class="floating-island">
                <button class="pill desktop-pill active" onclick="filterByCategory('all', this)">全部</button>
                <button class="pill desktop-pill" onclick="filterByCategory('000', this)">000 總類</button>
                <button class="pill desktop-pill" onclick="filterByCategory('100', this)">100 哲學</button>
                <button class="pill desktop-pill" onclick="filterByCategory('200', this)">200 宗教</button>
                <button class="pill desktop-pill" onclick="filterByCategory('300', this)">300 科學</button>
                <button class="pill desktop-pill" onclick="filterByCategory('400', this)">400 應用</button>
                <button class="pill desktop-pill" onclick="filterByCategory('500', this)">500 社科</button>
                <button class="pill desktop-pill" onclick="filterByCategory('600', this)">600 歷史</button>
                <button class="pill desktop-pill" onclick="filterByCategory('700', this)">700 世界史</button>
                <button class="pill desktop-pill" onclick="filterByCategory('800', this)">800 語文</button>
                <button class="pill desktop-pill" onclick="filterByCategory('900', this)">900 藝術</button>
                <button class="pill desktop-pill" onclick="showSection('recommendSection')"
                    style="color:var(--secondary)">推薦好書</button>
                <button class="pill desktop-pill" onclick="showSection('rankSection')"
                    style="color:var(--danger)">排行榜</button>
            </div>
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" class="search-input" placeholder="搜尋書名或作者...">
            </div>
        </div>

        <div class="carousel-wrapper">
            <div class="carousel-track" id="carouselTrack"></div>
        </div>

        <div class="main-section active" id="homeSection">
            <div style="display:flex; justify-content:center; align-items:center; gap:10px; margin-bottom:20px;">
                <label style="font-weight:600;">選擇期數:</label>
                <select id="issueSelect" onchange="switchIssue(this.value)"
                    style="padding:8px 16px; border-radius:100px; border:1px solid var(--border); background:var(--surface); outline:none; font-family:inherit;"></select>
                <button onclick="switchIssue(window.libraryData.latestIssue)"
                    style="background:var(--text); color:white; padding:8px 16px; border-radius:100px; font-weight:bold; border:none; box-shadow: var(--shadow-sm); cursor:pointer;">最新一期</button>
            </div>
            <div class="poster-controls" id="posterControls">
                <button class="desktop-poster-btn active" data-poster="1" onclick="setActivePoster(this, 1)">海報
                    1</button>
                <button class="desktop-poster-btn" data-poster="2" onclick="setActivePoster(this, 2)">海報 2</button>
            </div>
            <div class="books-grid" id="booksGrid"></div>
        </div>

        <div class="main-section" id="recommendSection">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 style="font-size:22px;">大家推薦的好書</h2>
                <button class="btn-primary" style="padding:8px 16px; font-size:14px;"
                    onclick="openRecommendForm()">我要推薦</button>
            </div>
            <div id="recommendList"></div>
        </div>

        <div class="main-section" id="rankSection">
            <h2 style="font-size:22px; margin-bottom:8px;">熱門排行榜</h2>
            <div id="rankingList"></div>
        </div>

        <div class="admin-panel hidden" id="adminPanel">
            <h2>管理員後台</h2>
            <button onclick="logoutAdmin()" class="btn-text">退出登錄</button>

            <div class="form-group">
                <h3>1. 期數管理</h3>
                <button class="btn-primary" onclick="addNewIssue()">新增期數</button>
            </div>

            <div class="form-group">
                <h3>2. 海報管理</h3>
                <p>海報功能已改為按鈕切換，無需上傳圖片</p>
                <div>
                    <label>選擇要刪除的期數: </label>
                    <select id="deleteIssueSelect">
                        <option value="1">第1期</option>
                    </select>
                    <button class="btn-danger" onclick="deleteWholeIssue()">刪除整期</button>
                </div>
            </div>

            <div class="form-group">
                <h3>3. 書籍資訊管理</h3>
                <div>
                    <label>選擇期數: </label>
                    <select id="bookIssueSelect">
                        <option value="1">第1期</option>
                    </select>
                    <label>選擇海報序號: </label>
                    <select id="bookPosterSelect">
                        <option value="1">海報1</option>
                        <option value="2">海報2</option>
                    </select>
                    <label>選擇書籍序號: </label>
                    <select id="bookNumSelect">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                    </select>
                </div>

                <div class="book-editor">
                    <input type="text" id="bookCallNo" placeholder="索書號">
                    <input type="text" id="bookTitle" placeholder="書名">
                    <label>分類代碼: </label>
                    <select id="bookClassCode">
                        <option value="000">000 總類</option>
                        <option value="100">100 哲學</option>
                        <option value="200">200 宗教</option>
                        <option value="300">300 科學</option>
                        <option value="400">400 應用科學</option>
                        <option value="500">500 社科</option>
                        <option value="600">600 歷史</option>
                        <option value="700">700 世界史</option>
                        <option value="800">800 語文</option>
                        <option value="900">900 藝術</option>
                    </select>
                    <input type="text" id="bookAuthor" placeholder="作者">
                    <textarea id="bookIntro" placeholder="簡介"></textarea>
                    <input type="text" id="bookSuitable" placeholder="適合人群">
                    <select id="bookStatus">
                        <option value="in">在架（可預約）</option>
                        <option value="out">不在架</option>
                        <option value="lost">遺失</option>
                    </select>
                    <input type="file" id="bookCoverUpload" accept="image/*">
                    <button class="btn-primary" onclick="saveBookInfo()">儲存書籍</button>
                    <button class="btn-danger" onclick="deleteBookInfo()">刪除書籍</button>
                </div>
            </div>

            <div class="form-group">
                <h3>4. 預約記錄管理</h3>
                <div id="reserveRecordsContainer">
                </div>
            </div>

            <div class="form-group">
                <h3>5. 推薦購書記錄管理</h3>
                <div id="recommendRecordsContainer">
                </div>
            </div>

            <div class="form-group">
                <h3>6. 留言管理</h3>
                <button class="btn-primary" onclick="loadAllComments()">加載所有留言</button>
                <div id="adminCommentList" style="margin-top:20px;">
                </div>
            </div>

            <div class="form-group">
                <h3>7. 公告管理</h3>
                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 500;">公告標題:</label>
                    <input type="text" id="announcementTitleInput" placeholder="輸入公告標題"
                        style="width: 100%; padding: 10px; margin: 5px 0;">

                    <label style="display: block; margin-bottom: 8px; font-weight: 500; margin-top: 15px;">公告內容:</label>
                    <textarea id="announcementContentInput" placeholder="輸入公告內容"
                        style="width: 100%; padding: 10px; margin: 5px 0; min-height: 100px;"></textarea>

                    <div style="margin-top: 20px; display: flex; gap: 10px;">
                        <button class="btn-primary" onclick="saveAnnouncement()">保存公告</button>
                        <button class="btn-danger" onclick="deleteAnnouncement()">刪除公告</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="hidden-admin-entry desktop-only" onclick="showAdminLogin(); event.stopPropagation();">®</div>
    </div>


    <div class="mobile-content">
        <div class="header-container" style="padding: 20px 16px 10px;">
            <h1 class="main-title" style="font-size:24px; margin-bottom:16px;">中學圖書館</h1>
            <div class="search-wrapper" style="margin-bottom:16px;">
                <span class="search-icon">🔍</span>
                <input type="text" id="mobileSearchInput" class="search-input" placeholder="搜尋書名或作者...">
            </div>
            <div class="floating-island" style="margin-bottom:10px;">
                <button class="pill mobile-pill active" onclick="mobileFilterByCategory('all', this)">全部</button>
                <button class="pill mobile-pill" onclick="mobileFilterByCategory('000', this)">000 總類</button>
                <button class="pill mobile-pill" onclick="mobileFilterByCategory('100', this)">100 哲學</button>
                <button class="pill mobile-pill" onclick="mobileFilterByCategory('200', this)">200 宗教</button>
                <button class="pill mobile-pill" onclick="mobileFilterByCategory('300', this)">300 科學</button>
                <button class="pill mobile-pill" onclick="mobileFilterByCategory('800', this)">800 語文</button>
                <button class="pill mobile-pill" onclick="mobileFilterByCategory('900', this)">900 藝術</button>
            </div>
        </div>

        <div class="mobile-main-section active" id="mobileHomeSection">
            <div style="display:flex; justify-content:center; align-items:center; gap:8px; margin-bottom:16px;">
                <select id="mobileIssueSelect" onchange="mobileSwitchIssue(this.value)"
                    style="padding:6px 12px; border-radius:100px; border:1px solid var(--border); background:var(--surface); font-size:14px; outline:none; font-family:inherit;"></select>
                <button onclick="mobileSwitchIssue(window.libraryData.latestIssue)"
                    style="background:var(--text); color:white; padding:6px 12px; border-radius:100px; font-weight:bold; border:none; font-size:14px; box-shadow: var(--shadow-sm); cursor:pointer;">最新一期</button>
            </div>
            <div class="poster-controls" id="mobilePosterControls" style="margin-bottom:16px;">
                <button class="mobile-poster-btn active" data-poster="1" onclick="setMobileActivePoster(this, 1)">海報
                    1</button>
                <button class="mobile-poster-btn" data-poster="2" onclick="setMobileActivePoster(this, 2)">海報 2</button>
            </div>
            <div class="books-grid" id="mobileBooksGrid"></div>
        </div>

        <div class="mobile-main-section" id="mobileRecommendSection">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 style="font-size:20px;">好書推薦</h2>
                <button class="btn-primary" style="padding:6px 12px; font-size:13px;"
                    onclick="openRecommendForm()">我要推薦</button>
            </div>
            <div id="mobileRecommendList"></div>
        </div>

        <div class="mobile-main-section" id="mobileRankSection">
            <h2 style="font-size:20px; margin-bottom:16px;">排行榜</h2>
            <div id="mobileRankingList"></div>
        </div>

        <div class="bottom-nav">
            <div class="tab-item active" onclick="showMobileSection('mobileHomeSection')">
                <span class="tab-icon">📚</span><span>新書</span>
            </div>
            <div class="tab-item" onclick="showMobileSection('mobileRecommendSection')">
                <span class="tab-icon">💡</span><span>推薦</span>
            </div>
            <div class="tab-item" onclick="showMobileSection('mobileRankSection')">
                <span class="tab-icon">🏆</span><span>排行</span>
            </div>
        </div>
    </div>


    <div class="bottom-sheet" id="desktopBookDetailSheet">
        <div class="bs-handle"></div>
        <div class="bs-header">
            <img id="dbsCover" class="bs-cover">
            <div class="bs-info">
                <h2 id="dbsTitle"></h2>
                <p id="dbsAuthor"></p>
                <p id="dbsStatus" style="font-weight:600; margin-top:8px;"></p>
            </div>
        </div>
        <div class="bs-desc-box">
            <p id="dbsIntro" style="margin-bottom:12px;"></p>
            <div style="color:var(--text-light); font-size:13px; border-top:1px solid var(--border); padding-top:12px;">
                <p id="dbsCallNo"></p>
                <p id="dbsSuitable"></p>
            </div>
        </div>
        <div id="dbsReserveContainer"></div>
    </div>

    <div class="mobile-detail-wrapper" id="mobileBookDetailWrapper">
        <div class="mobile-detail-bg" onclick="hideMobileBookDetail()"></div>
        <div class="mobile-detail-close" onclick="hideMobileBookDetail()">✕</div>
        <div class="mobile-detail-swiper" id="mobileDetailSwiper">
        </div>
    </div>

    <div class="modal-center" id="reserveModal">
        <div class="modal-close" onclick="closeAllModals()">✕</div>
        <h3 style="font-size:20px; margin-bottom:8px;">預約書籍</h3>
        <p id="reserveBookTitle" style="color:var(--primary); font-weight:600; margin-bottom:20px;"></p>
        <input type="text" id="reserveClass" class="input-field" placeholder="輸入班級 (例: 初三1)">
        <input type="text" id="reserveName" class="input-field" placeholder="輸入姓名">
        <input type="hidden" id="reserveBookId">
        <button class="btn-primary" style="width:100%; margin-top:10px;" onclick="submitReserve()">確認預約</button>
    </div>

    <div class="modal-center" id="recommendModal">
        <div class="modal-close" onclick="closeAllModals()">✕</div>
        <h3 style="font-size:20px; margin-bottom:20px;">推薦好書給圖書館</h3>
        <input type="text" id="recName" class="input-field" placeholder="推薦書名">
        <textarea id="recReason" class="input-field" placeholder="推薦理由 (選填)"
            style="height:100px; resize:none;"></textarea>
        <button class="btn-primary" style="width:100%; margin-top:10px;" onclick="submitRecommend()">送出推薦</button>
    </div>

    <div class="bottom-sheet" id="commentSheet">
        <div class="bs-handle"></div>
        <h3 id="commentBookTitle" style="font-size:18px; margin-bottom:16px;"></h3>
        <div style="position:relative; margin-bottom:20px;">
            <input type="text" id="commentInput" class="input-field" placeholder="留下你的評論..."
                style="padding-right:80px; margin-bottom:0;">
            <button
                style="position:absolute; right:8px; top:50%; transform:translateY(-50%); background:var(--primary); color:white; border-radius:100px; padding:6px 12px; font-weight:bold; border:none;"
                onclick="submitComment()">發佈</button>
            <input type="hidden" id="commentBookId">
        </div>
        <div id="commentList" style="display:flex; flex-direction:column;"></div>
    </div>

    <div class="modal hidden" id="adminLoginModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeAllModals()">✕</span>
            <h3 style="margin-bottom: 20px;">管理員登錄</h3>
            <div class="form-group" style="padding: 15px; margin: 15px 0;">
                <label>賬號: </label>
                <input type="text" id="adminUser" class="input-field" required>
            </div>
            <div class="form-group" style="padding: 15px; margin: 15px 0;">
                <label>密碼: </label>
                <input type="password" id="adminPass" class="input-field" required>
            </div>
            <button type="button" onclick="adminLogin()" class="btn-primary" style="width: 100%;">登錄</button>
        </div>
    </div>

</body>

</html>
