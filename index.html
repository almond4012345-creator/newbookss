<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中學圖書館 | 每週新書速遞</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, getDoc, updateDoc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAdNZnrW2xEh6AYFs5osZ0Zi-Tl5ZPbqfs",
            authDomain: "newbookf-a73de-5a312-47013.firebaseapp.com",
            projectId: "newbookf-a73de-5a312-47013",
            storageBucket: "newbookf-a73de-5a312-47013.firebasestorage.app",
            messagingSenderId: "1022548977720",
            appId: "1:1022548977720:web:b713d061247b81b98d1ecd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.libraryData = {
            issues: {}, reserveRecords: [], recommendRecords: [],
            latestIssue: 1, allBooks: []
        };
        window.currentIssue = 1;

        const placeholderImg = "data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='100' height='150' viewBox='0 0 100 150'%3E%3Crect width='100' height='150' fill='%23f5f5f7'/%3E%3Ctext x='50' y='75' font-family='sans-serif' font-size='14' fill='%238e8e93' text-anchor='middle' dominant-baseline='middle'%3E暫無封面%3C/text%3E%3C/svg%3E";

        // ================= UI 工具 =================
        window.showToast = function (message, type = "success") {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        window.closeAllModals = function () {
            document.querySelectorAll('.modal-overlay').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.bottom-sheet').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.modal-center').forEach(el => el.classList.remove('active'));
        }

        // ================= 資料載入與初始化 =================
        async function loadData() {
            try {
                document.getElementById('loadingIndicator').classList.add('active');

                const issuesSnap = await getDocs(collection(db, "issues"));
                window.libraryData.issues = {};
                issuesSnap.forEach(doc => window.libraryData.issues[doc.id] = doc.data());

                const reservesSnap = await getDocs(collection(db, "reserves"));
                window.libraryData.reserveRecords = [];
                reservesSnap.forEach(doc => window.libraryData.reserveRecords.push({ ...doc.data(), id: doc.id }));

                const recommendsSnap = await getDocs(collection(db, "recommends"));
                window.libraryData.recommendRecords = [];
                recommendsSnap.forEach(doc => window.libraryData.recommendRecords.push({ ...doc.data(), id: doc.id }));

                const settingsDoc = await getDoc(doc(db, "settings", "system"));
                window.libraryData.latestIssue = settingsDoc.exists() ? settingsDoc.data().latestIssue : 1;

                const likesSnap = await getDocs(collection(db, "bookLikes"));
                window.libraryData.bookLikes = {};
                likesSnap.forEach(doc => window.libraryData.bookLikes[doc.id] = doc.data().count || 0);

                const commentsSnap = await getDocs(collection(db, "bookComments"));
                window.libraryData.bookComments = {};
                commentsSnap.forEach(doc => {
                    const data = doc.data();
                    if (!window.libraryData.bookComments[data.bookId]) window.libraryData.bookComments[data.bookId] = [];
                    window.libraryData.bookComments[data.bookId].push({
                        id: doc.id, content: data.content, likeCount: data.likeCount || 0,
                        isTop: data.isTop || false, time: data.time || new Date().toLocaleString()
                    });
                });

                collectAllBooks();
                initUI();
                await loadAnnouncement();
                document.getElementById('loadingIndicator').classList.remove('active');
            } catch (err) {
                console.error("載入失敗:", err);
                showToast("資料載入失敗，請重新整理頁面", "error");
                document.getElementById('loadingIndicator').classList.remove('active');
            }
        }

        function collectAllBooks() {
            window.libraryData.allBooks = [];
            for (const issue in window.libraryData.issues) {
                const issueData = window.libraryData.issues[issue];
                for (const poster in issueData.books) {
                    const posterBooks = issueData.books[poster];
                    for (const bookNum in posterBooks) {
                        const book = { ...posterBooks[bookNum] };
                        book.id = `issue-${issue}-poster-${poster}-book-${bookNum}`;
                        book.issue = issue; book.posterNum = poster; book.bookNum = bookNum;
                        window.libraryData.allBooks.push(book);
                    }
                }
            }
        }

        async function saveData() {
            try {
                for (const issueId in window.libraryData.issues) {
                    await setDoc(doc(db, "issues", issueId), window.libraryData.issues[issueId]);
                }
                await setDoc(doc(db, "settings", "system"), { latestIssue: window.libraryData.latestIssue });
                for (const bookId in window.libraryData.bookLikes) {
                    await setDoc(doc(db, "bookLikes", bookId), { count: window.libraryData.bookLikes[bookId] || 0 });
                }
                const allComments = [];
                for (const bookId in window.libraryData.bookComments) {
                    window.libraryData.bookComments[bookId].forEach(comment => allComments.push({ ...comment, bookId }));
                }
                const commentsCol = collection(db, "bookComments");
                const oldSnap = await getDocs(commentsCol);
                oldSnap.forEach(async (d) => { await deleteDoc(d.ref); });
                for (const comment of allComments) {
                    if (comment.id) { await setDoc(doc(db, "bookComments", comment.id), comment); }
                    else { const newRef = doc(collection(db, "bookComments")); await setDoc(newRef, { ...comment, id: newRef.id }); }
                }
                collectAllBooks();
            } catch (err) { showToast("儲存失敗", "error"); }
        }

        function initUI() {
            renderIssueSelectors();
            switchIssue(window.libraryData.latestIssue);
            initCarousel();
            renderRecommendList();
            renderRankingList();
            setupSearchDebounce();
        }

        async function loadAnnouncement() {
            try {
                const docSnap = await getDoc(doc(db, "settings", "announcement"));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.title && data.content) {
                        document.getElementById('announcementTitle').textContent = data.title;
                        document.getElementById('announcementContent').innerHTML = data.content.replace(/\n/g, '<br>');
                        document.getElementById('modalOverlay').classList.add('active');
                        document.getElementById('announcementModal').classList.add('active');
                    }
                }
            } catch (err) { console.error("加載公告失敗:", err); }
        }

        // ================= 電腦版與共用邏輯 =================
        function renderIssueSelectors() {
            const issues = Object.keys(window.libraryData.issues).map(Number).sort((a, b) => a - b);

            // 先組裝好所有的 option HTML
            let optionsHtml = '';
            issues.forEach(issue => {
                optionsHtml += `<option value="${issue}">第${issue}期</option>`;
            });

            // 列出所有可能需要載入期數的 select ID
            const selectorIds = [
                'issueSelect',
                'mobileIssueSelect',
                'bookIssueSelect',
                'deleteIssueSelect',
                'posterIssueSelect'
            ];

            // 加上 if (sel) 防呆檢查，確保元素存在才寫入
            selectorIds.forEach(id => {
                const sel = document.getElementById(id);
                if (sel) {
                    sel.innerHTML = optionsHtml;
                    if (id !== 'deleteIssueSelect') {
                        sel.value = window.libraryData.latestIssue;
                    }
                }
            });
        }

        window.switchIssue = function (issue) {
            window.currentIssue = Number(issue);
            const sel = document.getElementById('issueSelect');
            if (sel) sel.value = window.currentIssue;
            document.querySelectorAll('.poster-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector('.poster-btn[data-poster="1"]')?.classList.add('active');
            renderBooks(window.currentIssue, 1);
            showSection('homeSection');
        }

        window.filterByCategory = function (category, element) {
            document.querySelectorAll('.pill').forEach(el => el.classList.remove('active'));
            if (element) element.classList.add('active');

            const container = document.getElementById('booksGrid');
            container.innerHTML = '';
            document.getElementById('posterControls').style.display = 'none';

            const filtered = category === 'all' ? window.libraryData.allBooks : window.libraryData.allBooks.filter(b => b.classCode === category);
            filtered.forEach(book => container.appendChild(createBookCard(book)));
            showSection('homeSection');
        }

        function createBookCard(book) {
            const card = document.createElement('div');
            card.className = 'book-card';
            const likeCount = window.libraryData.bookLikes[book.id] || 0;
            const imgSrc = book.cover || placeholderImg;
            let statusBadge = book.status === 'in' ? '<span class="status-badge status-in">可預約</span>' :
                (book.status === 'out' ? '<span class="status-badge status-out">不在架</span>' : '<span class="status-badge status-reserved">已預約</span>');

            card.innerHTML = `
                <div class="book-cover-wrapper" onclick="openBookDetail('${book.id}')">
                    <img src="${imgSrc}" class="book-cover" onerror="this.src='${placeholderImg}'">
                    ${statusBadge}
                </div>
                <div class="book-info">
                    <h3 class="book-title" onclick="openBookDetail('${book.id}')">${book.title}</h3>
                    <div class="book-meta">
                        <span class="author">${book.author || '待編輯'}</span>
                    </div>
                    <div class="book-actions">
                        <button class="action-btn ${likeCount > 0 ? 'liked' : ''}" onclick="bookLike('${book.id}', event)">
                            ${likeCount > 0 ? '❤️' : '🤍'} <span>${likeCount}</span>
                        </button>
                        <button class="action-btn" onclick="openCommentModal('${book.id}', event)">💬</button>
                    </div>
                </div>
            `;
            return card;
        }

        window.renderBooks = function (issue, posterNum) {
            const container = document.getElementById('booksGrid');
            container.innerHTML = '';
            document.getElementById('posterControls').style.display = 'flex';

            if (!window.libraryData.issues[issue] || !window.libraryData.issues[issue].books[posterNum]) return;
            const books = window.libraryData.issues[issue].books[posterNum];

            for (let i = 1; i <= 9; i++) {
                if (books[i]) container.appendChild(createBookCard(books[i]));
            }
        }

        window.setActivePoster = function (btn, posterNum) {
            document.querySelectorAll('.poster-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderBooks(window.currentIssue, posterNum);
        }

        window.showSection = function (sectionId) {
            document.querySelectorAll('.main-section').forEach(sec => sec.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');

            // Mobile Nav UI update
            document.querySelectorAll('.tab-item').forEach(tab => tab.classList.remove('active'));
            const activeTab = document.querySelector(`.tab-item[onclick*="${sectionId}"]`);
            if (activeTab) activeTab.classList.add('active');
        }

        // ================= 無縫巡迴展示欄 =================
        function initCarousel() {
            const track = document.getElementById('carouselTrack');
            track.innerHTML = '';
            let books = window.libraryData.allBooks.filter(b => b.cover && b.cover.trim() !== '');
            if (books.length === 0) return;

            // 隨機打亂並取前20本
            books = books.sort(() => 0.5 - Math.random()).slice(0, 20);

            // 建立節點
            const createItem = (book) => {
                const div = document.createElement('div');
                div.className = 'carousel-item';
                div.innerHTML = `<img src="${book.cover}" onerror="this.src='${placeholderImg}'">`;
                div.onclick = () => openBookDetail(book.id);
                return div;
            };

            // 加入原始 20 本
            books.forEach(b => track.appendChild(createItem(b)));
            // 複製一份加入尾端，達成無縫動畫
            books.forEach(b => track.appendChild(createItem(b)));
        }

        // ================= 書籍詳情與底部彈窗 (Bottom Sheet) =================
        window.openBookDetail = function (bookId) {
            const book = window.libraryData.allBooks.find(b => b.id === bookId);
            if (!book) return;

            const imgSrc = book.cover || placeholderImg;
            let statusHtml = book.status === 'in' ? '<span style="color:var(--success)">在架 (可預約)</span>' : (book.status === 'out' ? '<span style="color:var(--text-light)">不在架</span>' : '<span style="color:var(--danger)">已被預約</span>');
            let reserveBtn = book.status === 'in' ? `<button class="btn-primary" onclick="openReserveModal('${book.id}')" style="width:100%; margin-top:15px; border-radius:16px;">立即預約</button>` : '';

            document.getElementById('bsCover').src = imgSrc;
            document.getElementById('bsTitle').textContent = book.title;
            document.getElementById('bsAuthor').textContent = `作者：${book.author || '待編輯'}`;
            document.getElementById('bsCallNo').textContent = `索書號：${book.callNo || '待編輯'}`;
            document.getElementById('bsSuitable').textContent = `適合：${book.suitable || '待編輯'}`;
            document.getElementById('bsStatus').innerHTML = `狀態：${statusHtml}`;
            document.getElementById('bsIntro').textContent = book.intro || '暫無簡介';
            document.getElementById('bsReserveContainer').innerHTML = reserveBtn;

            document.getElementById('modalOverlay').classList.add('active');
            document.getElementById('bookDetailSheet').classList.add('active');
        }

        // ================= 預約邏輯 =================
        window.openReserveModal = function (bookId) {
            closeAllModals();
            const book = window.libraryData.allBooks.find(b => b.id === bookId);
            if (!book) return;

            document.getElementById('reserveBookTitle').textContent = book.title;
            document.getElementById('reserveBookId').value = bookId;

            const classInput = document.getElementById('reserveClass');
            const nameInput = document.getElementById('reserveName');
            classInput.value = localStorage.getItem('lib_className') || '';
            nameInput.value = localStorage.getItem('lib_studentName') || '';
            classInput.classList.remove('error');
            nameInput.classList.remove('error');

            setTimeout(() => {
                document.getElementById('modalOverlay').classList.add('active');
                document.getElementById('reserveModal').classList.add('active');
            }, 300); // 讓 Bottom sheet 先收起來
        }

        window.submitReserve = function () {
            const bookId = document.getElementById('reserveBookId').value;
            const book = window.libraryData.allBooks.find(b => b.id === bookId);
            const classInput = document.getElementById('reserveClass');
            const nameInput = document.getElementById('reserveName');
            const className = classInput.value.trim();
            const studentName = nameInput.value.trim();

            if (!className) { classInput.classList.add('error'); return; } else { classInput.classList.remove('error'); }
            if (!studentName) { nameInput.classList.add('error'); return; } else { nameInput.classList.remove('error'); }

            localStorage.setItem('lib_className', className);
            localStorage.setItem('lib_studentName', studentName);

            const record = {
                bookId, bookTitle: book.title, className, studentName,
                time: new Date().toLocaleString(), status: '已預約'
            };

            window.saveReserveRecord(record);
            closeAllModals();
            showToast('預約成功！請於2天內至櫃檯取書。', 'success');
        }

        window.saveReserveRecord = async function (record) {
            try {
                const recordRef = doc(collection(db, "reserves"));
                await setDoc(recordRef, record);
                const [_, issue, __, poster, ___, bookNum] = record.bookId.split('-');
                if (window.libraryData.issues[issue]?.books[poster]?.[bookNum]) {
                    window.libraryData.issues[issue].books[poster][bookNum].status = 'reserved';
                    await saveData();
                    renderBooks(window.currentIssue, document.querySelector('.poster-btn.active')?.dataset.poster || 1);
                }
            } catch (err) { showToast("預約失敗", "error"); }
        }

        // ================= 點讚與留言 =================
        window.bookLike = async function (bookId, event) {
            event.stopPropagation();
            if (!window.libraryData.bookLikes[bookId]) window.libraryData.bookLikes[bookId] = 0;
            window.libraryData.bookLikes[bookId] += 1;

            // Optimistic UI update
            const btns = document.querySelectorAll(`button[onclick^="bookLike('${bookId}'"].action-btn`);
            btns.forEach(btn => {
                btn.innerHTML = `❤️ <span>${window.libraryData.bookLikes[bookId]}</span>`;
                btn.classList.add('liked');
                btn.style.transform = 'scale(1.2)';
                setTimeout(() => btn.style.transform = 'scale(1)', 200);
            });
            await setDoc(doc(db, "bookLikes", bookId), { count: window.libraryData.bookLikes[bookId] });
        }

        window.openCommentModal = function (bookId, event) {
            if (event) event.stopPropagation();
            closeAllModals();
            const book = window.libraryData.allBooks.find(b => b.id === bookId);
            document.getElementById('commentBookTitle').textContent = book.title;
            document.getElementById('commentBookId').value = bookId;
            loadComments(bookId);

            setTimeout(() => {
                document.getElementById('modalOverlay').classList.add('active');
                document.getElementById('commentSheet').classList.add('active');
            }, 100);
        }

        function loadComments(bookId) {
            const list = document.getElementById('commentList');
            list.innerHTML = '';
            let comments = window.libraryData.bookComments[bookId] || [];
            comments.sort((a, b) => (b.isTop - a.isTop) || (b.likeCount - a.likeCount));

            if (comments.length === 0) {
                list.innerHTML = '<div style="text-align:center; color:var(--text-light); padding:20px;">快來搶頭香留言！</div>';
                return;
            }

            comments.forEach(c => {
                const topTag = c.isTop ? '<span class="tag-top">置頂</span>' : '';
                list.innerHTML += `
                    <div class="comment-item">
                        ${topTag}
                        <div class="comment-text">${c.content}</div>
                        <div class="comment-footer">
                            <span>${c.time}</span>
                            <button onclick="likeComment('${bookId}', '${c.id}', this)">❤️ ${c.likeCount}</button>
                        </div>
                    </div>
                `;
            });
        }

        window.submitComment = async function () {
            const bookId = document.getElementById('commentBookId').value;
            const input = document.getElementById('commentInput');
            if (!input.value.trim()) { showToast('請輸入留言', 'error'); return; }

            const newComment = { id: 'c_' + Date.now(), content: input.value.trim(), likeCount: 0, isTop: false, time: new Date().toLocaleString() };
            if (!window.libraryData.bookComments[bookId]) window.libraryData.bookComments[bookId] = [];
            window.libraryData.bookComments[bookId].push(newComment);
            await saveData();
            input.value = '';
            loadComments(bookId);
            showToast('留言發佈成功！');
        }

        window.likeComment = async function (bookId, commentId, btn) {
            const comment = window.libraryData.bookComments[bookId].find(c => c.id === commentId);
            if (comment) {
                comment.likeCount++;
                btn.innerHTML = `❤️ ${comment.likeCount}`;
                await saveData();
            }
        }

        window.toggleCommentExpand = function (el) {
            el.previousElementSibling.classList.toggle('expanded');
            el.textContent = el.textContent === '展開' ? '收起' : '展開';
        }

        // ================= 搜尋與其他功能 =================
        let searchTimeout;
        window.setupSearchDebounce = function () {
            const input = document.getElementById('searchInput');
            const clearBtn = document.getElementById('searchClear');

            input.addEventListener('input', (e) => {
                clearTimeout(searchTimeout);
                const keyword = e.target.value.trim();
                clearBtn.style.display = keyword ? 'block' : 'none';

                searchTimeout = setTimeout(() => {
                    executeSearch(keyword.toLowerCase());
                }, 500);
            });
        }

        window.clearSearch = function () {
            document.getElementById('searchInput').value = '';
            document.getElementById('searchClear').style.display = 'none';
            executeSearch('');
        }

        function executeSearch(keyword) {
            const container = document.getElementById('booksGrid');
            container.innerHTML = '';

            if (!keyword) {
                document.getElementById('posterControls').style.display = 'flex';
                renderBooks(window.currentIssue, document.querySelector('.poster-btn.active')?.dataset.poster || 1);
                return;
            }

            document.getElementById('posterControls').style.display = 'none';
            const matched = window.libraryData.allBooks.filter(b =>
                (b.title && b.title.toLowerCase().includes(keyword)) ||
                (b.author && b.author.toLowerCase().includes(keyword))
            );

            if (matched.length === 0) {
                container.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding:40px; color:var(--text-light);">找不到相關書籍</div>';
            } else {
                matched.forEach(book => container.appendChild(createBookCard(book)));
            }
            showSection('homeSection');
        }

        function renderRecommendList() {
            const list = document.getElementById('recommendList');
            list.innerHTML = '';
            const sorted = [...window.libraryData.recommendRecords].sort((a, b) => new Date(b.time) - new Date(a.time));
            sorted.forEach((r, i) => {
                const color = window.getRandomSoftColor();
                list.innerHTML += `
                    <div class="list-card">
                        <div class="avatar" style="background:${color}">${i + 1}</div>
                        <div class="info">
                            <div class="title">${r.bookName}</div>
                            <div class="desc">推薦理由：${r.reason}</div>
                        </div>
                    </div>`;
            });
        }

        function renderRankingList() {
            const list = document.getElementById('rankingList');
            list.innerHTML = '';
            const ranked = window.libraryData.allBooks.map(b => ({ ...b, likes: window.libraryData.bookLikes[b.id] || 0 }))
                .filter(b => b.likes > 0).sort((a, b) => b.likes - a.likes).slice(0, 10);

            ranked.forEach((b, i) => {
                const color = window.getRandomSoftColor();
                list.innerHTML += `
                    <div class="list-card" onclick="openBookDetail('${b.id}')">
                        <div class="avatar" style="background:${color}">${i + 1}</div>
                        <div class="info">
                            <div class="title">${b.title}</div>
                            <div class="desc" style="color:var(--danger)">❤️ ${b.likes} 人喜歡</div>
                        </div>
                    </div>`;
            });
        }

        window.openRecommendForm = function () {
            document.getElementById('modalOverlay').classList.add('active');
            document.getElementById('recommendModal').classList.add('active');
        }

        window.submitRecommend = function () {
            const name = document.getElementById('recName').value.trim();
            const reason = document.getElementById('recReason').value.trim() || '無';
            if (!name) { showToast('請填寫書名', 'error'); return; }

            window.saveRecommendRecord({ bookName: name, reason, time: new Date().toLocaleString(), status: '已推薦' });
            closeAllModals();
            showToast('推薦成功！');
            document.getElementById('recName').value = '';
            document.getElementById('recReason').value = '';
        }

        window.getRandomSoftColor = function () {
            const colors = ['#0071e3', '#ff9500', '#34c759', '#af52de', '#ff2d55', '#5856d6'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        window.onload = loadData;
    </script>
    <style>
        :root {
            --primary: #0071e3;
            --primary-light: #e5f0fa;
            --secondary: #ff9500;
            --success: #34c759;
            --danger: #ff3b30;
            --bg: #f5f5f7;
            --surface: #ffffff;
            --text: #1d1d1f;
            --text-light: #86868b;
            --border: #d2d2d7;
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 8px;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            --shadow-sm: 0 2px 10px rgba(0, 0, 0, 0.05);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: "SF Pro Text", "PingFang TC", sans-serif;
            background: var(--bg);
            color: var(--text);
            padding-bottom: 80px;
        }

        /* ================= 共通元件 ================= */
        input,
        textarea,
        button,
        select {
            font-family: inherit;
            outline: none;
            border: none;
        }

        button {
            cursor: pointer;
            transition: var(--transition);
        }

        button:active {
            transform: scale(0.96);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            padding: 12px 24px;
            border-radius: 100px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0, 113, 227, 0.3);
        }

        .input-field {
            width: 100%;
            padding: 14px 16px;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            background: var(--surface);
            margin-bottom: 15px;
            font-size: 16px;
            transition: border 0.3s;
        }

        .input-field:focus {
            border-color: var(--primary);
        }

        .input-field.error {
            border-color: var(--danger);
            background: #fff0f0;
        }

        /* ================= 頂部導航與搜尋 (懸浮中島設計) ================= */
        .header-container {
            text-align: center;
            padding: 40px 20px 20px;
        }

        .main-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.5px;
            margin-bottom: 24px;
        }

        .floating-island {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 100px;
            padding: 8px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.5);
            margin-bottom: 20px;
            max-width: 100%;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .floating-island::-webkit-scrollbar {
            display: none;
        }

        .pill {
            padding: 10px 20px;
            border-radius: 100px;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-light);
            background: transparent;
            white-space: nowrap;
        }

        .pill.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(0, 113, 227, 0.25);
        }

        .pill:hover:not(.active) {
            background: var(--primary-light);
            color: var(--primary);
        }

        .search-wrapper {
            position: relative;
            max-width: 400px;
            margin: 0 auto 30px;
        }

        .search-input {
            width: 100%;
            padding: 14px 40px;
            border-radius: 100px;
            border: none;
            background: var(--surface);
            box-shadow: var(--shadow-sm);
            font-size: 16px;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.5;
        }

        .search-clear {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: #e5e5ea;
            color: #8e8e93;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            display: none;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        /* ================= 無縫巡迴展示區 ================= */
        .carousel-wrapper {
            width: 100%;
            overflow: hidden;
            padding: 20px 0 40px;
            position: relative;
        }

        /* 兩側漸層遮罩 */
        .carousel-wrapper::before,
        .carousel-wrapper::after {
            content: '';
            position: absolute;
            top: 0;
            width: 100px;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .carousel-wrapper::before {
            left: 0;
            background: linear-gradient(to right, var(--bg), transparent);
        }

        .carousel-wrapper::after {
            right: 0;
            background: linear-gradient(to left, var(--bg), transparent);
        }

        @keyframes scrollMarquee {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        .carousel-track {
            display: flex;
            width: max-content;
            gap: 20px;
            animation: scrollMarquee 40s linear infinite;
        }

        .carousel-track:hover {
            animation-play-state: paused;
        }

        .carousel-item {
            width: 140px;
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: transform 0.3s;
            flex-shrink: 0;
        }

        .carousel-item:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow);
        }

        .carousel-item img {
            width: 100%;
            height: 210px;
            object-fit: cover;
            display: block;
        }

        /* ================= 書籍瀑布流雙欄配置 ================= */
        .main-section {
            display: none;
            padding: 0 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .main-section.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .poster-controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .poster-btn {
            padding: 12px 30px;
            border-radius: var(--radius-md);
            background: var(--surface);
            border: 2px solid transparent;
            color: var(--text);
            font-weight: 600;
            box-shadow: var(--shadow-sm);
        }

        .poster-btn.active {
            border-color: var(--primary);
            background: var(--primary-light);
            color: var(--primary);
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
        }

        .book-card {
            background: var(--surface);
            border-radius: var(--radius-md);
            padding: 12px;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
        }

        .book-cover-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 2/3;
            border-radius: var(--radius-sm);
            overflow: hidden;
            margin-bottom: 12px;
        }

        .book-cover {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .status-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 4px 8px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 600;
            backdrop-filter: blur(5px);
        }

        .status-in {
            background: rgba(52, 199, 89, 0.9);
            color: white;
        }

        .status-out {
            background: rgba(255, 59, 48, 0.9);
            color: white;
        }

        .status-reserved {
            background: rgba(255, 149, 0, 0.9);
            color: white;
        }

        .book-title {
            font-size: 14px;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .book-meta {
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: auto;
        }

        .book-actions {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--bg);
        }

        .action-btn {
            background: var(--bg);
            padding: 6px 10px;
            border-radius: 100px;
            font-size: 12px;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .action-btn.liked {
            color: var(--danger);
            background: #fff0f0;
        }

        /* ================= 列表卡片 (推薦與排行) ================= */
        .list-card {
            background: var(--surface);
            border-radius: var(--radius-md);
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
        }

        .list-card .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 18px;
            flex-shrink: 0;
        }

        .list-card .title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .list-card .desc {
            font-size: 13px;
            color: var(--text-light);
        }

        /* ================= 底部導覽列 (Mobile Only) ================= */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-light);
            font-size: 10px;
            gap: 4px;
            transition: color 0.3s;
        }

        .tab-item.active {
            color: var(--primary);
        }

        .tab-icon {
            font-size: 22px;
        }

        @media (min-width: 768px) {
            .bottom-nav {
                display: none;
            }
        }

        /* ================= 彈窗與遮罩系統 ================= */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* 底部彈窗 (Bottom Sheet) */
        .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            max-height: 85vh;
            background: var(--surface);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            z-index: 1000;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            overflow-y: auto;
            padding: 24px;
            padding-bottom: calc(24px + env(safe-area-inset-bottom));
        }

        .bottom-sheet.active {
            transform: translateY(0);
        }

        .bs-handle {
            width: 40px;
            height: 5px;
            background: #e5e5ea;
            border-radius: 10px;
            margin: 0 auto 20px;
        }

        .bs-header {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
        }

        .bs-cover {
            width: 100px;
            height: 150px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            box-shadow: var(--shadow-sm);
        }

        .bs-info h2 {
            font-size: 20px;
            line-height: 1.3;
            margin-bottom: 8px;
        }

        .bs-info p {
            font-size: 14px;
            color: var(--text-light);
            margin-bottom: 4px;
        }

        .bs-desc-box {
            background: var(--bg);
            padding: 16px;
            border-radius: var(--radius-md);
            font-size: 14px;
            line-height: 1.6;
            color: var(--text);
            margin-bottom: 24px;
        }

        /* 置中彈窗 */
        .modal-center {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -40%) scale(0.95);
            width: 90%;
            max-width: 400px;
            background: var(--surface);
            border-radius: var(--radius-lg);
            z-index: 1000;
            padding: 30px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: var(--shadow);
        }

        .modal-center.active {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            pointer-events: auto;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: var(--bg);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-light);
            font-weight: bold;
        }

        /* 留言區塊 */
        .comment-item {
            border-bottom: 1px solid var(--bg);
            padding: 16px 0;
            position: relative;
        }

        .tag-top {
            position: absolute;
            top: 16px;
            right: 0;
            background: var(--secondary);
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .comment-text {
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 8px;
            color: var(--text);
            /* 截斷設定 */
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .comment-text.expanded {
            -webkit-line-clamp: unset;
        }

        .comment-footer {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-light);
            align-items: center;
        }

        .comment-footer button {
            background: var(--bg);
            padding: 4px 10px;
            border-radius: 100px;
            font-size: 12px;
            color: var(--danger);
        }

        /* Toast & Loading */
        .toast-container {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            padding: 14px 24px;
            border-radius: 100px;
            color: white;
            font-weight: 500;
            font-size: 14px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            animation: slideDown 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .toast-success {
            background: rgba(52, 199, 89, 0.95);
            backdrop-filter: blur(10px);
        }

        .toast-error {
            background: rgba(255, 59, 48, 0.95);
            backdrop-filter: blur(10px);
        }

        @keyframes slideDown {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--surface);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .loading-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--bg);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* 電腦版 RWD 調整 */
        @media (min-width: 768px) {
            .books-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 24px;
            }

            .bottom-sheet {
                width: 500px;
                left: 50%;
                transform: translate(-50%, 100%);
                border-radius: var(--radius-lg);
                bottom: 20px;
                max-height: 80vh;
            }

            .bottom-sheet.active {
                transform: translate(-50%, 0);
            }

            .bs-handle {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div id="toastContainer" class="toast-container"></div>
    <div id="loadingIndicator" class="loading-overlay">
        <div class="spinner"></div>
        <p style="color:var(--text-light); font-weight:500;">圖書館資料同步中...</p>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeAllModals()"></div>

    <div class="modal-center" id="announcementModal">
        <h3 id="announcementTitle" style="font-size:20px; margin-bottom:16px;"></h3>
        <div id="announcementContent"
            style="font-size:15px; color:var(--text-light); line-height:1.6; margin-bottom:24px;"></div>
        <button class="btn-primary" style="width:100%" onclick="closeAllModals()">知道了</button>
    </div>

    <div class="header-container">
        <h1 class="main-title">中學圖書館 | 新書速遞</h1>

        <div class="floating-island">
            <button class="pill active" onclick="filterByCategory('all', this)">全部</button>
            <button class="pill" onclick="filterByCategory('000', this)">000 總類</button>
            <button class="pill" onclick="filterByCategory('100', this)">100 哲學</button>
            <button class="pill" onclick="filterByCategory('200', this)">200 宗教</button>
            <button class="pill" onclick="filterByCategory('300', this)">300 科學</button>
            <button class="pill" onclick="filterByCategory('400', this)">400 應用</button>
            <button class="pill" onclick="filterByCategory('500', this)">500 社科</button>
            <button class="pill" onclick="filterByCategory('600', this)">600 歷史</button>
            <button class="pill" onclick="filterByCategory('700', this)">700 世界史</button>
            <button class="pill" onclick="filterByCategory('800', this)">800 語文</button>
            <button class="pill" onclick="filterByCategory('900', this)">900 藝術</button>
        </div>

        <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" class="search-input" placeholder="搜尋書名或作者...">
            <div id="searchClear" class="search-clear" onclick="clearSearch()">✕</div>
        </div>
    </div>

    <div class="carousel-wrapper">
        <div class="carousel-track" id="carouselTrack"></div>
    </div>

    <div class="main-section active" id="homeSection">
        <div style="display:flex; justify-content:center; align-items:center; gap:10px; margin-bottom:20px;">
            <label style="font-weight:600;">選擇期數:</label>
            <select id="issueSelect" onchange="switchIssue(this.value)"
                style="padding:8px 16px; border-radius:100px; border:1px solid var(--border); background:var(--surface); outline:none; font-family:inherit;"></select>
            <button onclick="switchIssue(window.libraryData.latestIssue)"
                style="background:var(--text); color:white; padding:8px 16px; border-radius:100px; font-weight:bold; border:none; box-shadow: var(--shadow-sm); cursor:pointer;">最新一期</button>
        </div>
        <div class="poster-controls" id="posterControls">
            <button class="poster-btn active" data-poster="1" onclick="setActivePoster(this, 1)">海報 1</button>
            <button class="poster-btn" data-poster="2" onclick="setActivePoster(this, 2)">海報 2</button>
        </div>
        <div class="books-grid" id="booksGrid"></div>
    </div>

    <div class="main-section" id="recommendSection">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="font-size:22px;">大家推薦的好書</h2>
            <button class="btn-primary" style="padding:8px 16px; font-size:14px;"
                onclick="openRecommendForm()">我要推薦</button>
        </div>
        <div id="recommendList"></div>
    </div>

    <div class="main-section" id="rankSection">
        <h2 style="font-size:22px; margin-bottom:8px;">熱門排行榜</h2>
        <p style="color:var(--text-light); font-size:14px; margin-bottom:20px;">依照愛心數排序，點擊可看詳情</p>
        <div id="rankingList"></div>
    </div>

    <div class="bottom-nav">
        <div class="tab-item active" onclick="showSection('homeSection')">
            <span class="tab-icon">📚</span><span>新書</span>
        </div>
        <div class="tab-item" onclick="showSection('recommendSection')">
            <span class="tab-icon">💡</span><span>推薦</span>
        </div>
        <div class="tab-item" onclick="showSection('rankSection')">
            <span class="tab-icon">🏆</span><span>排行</span>
        </div>
    </div>

    <div class="bottom-sheet" id="bookDetailSheet">
        <div class="bs-handle"></div>
        <div class="bs-header">
            <img id="bsCover" class="bs-cover">
            <div class="bs-info">
                <h2 id="bsTitle"></h2>
                <p id="bsAuthor"></p>
                <p id="bsStatus" style="font-weight:600; color:var(--primary); margin-top:8px;"></p>
            </div>
        </div>
        <div class="bs-desc-box">
            <p id="bsIntro" style="margin-bottom:12px;"></p>
            <div style="color:var(--text-light); font-size:13px; border-top:1px solid var(--border); padding-top:12px;">
                <p id="bsCallNo"></p>
                <p id="bsSuitable"></p>
            </div>
        </div>
        <div id="bsReserveContainer"></div>
    </div>

    <div class="modal-center" id="reserveModal">
        <div class="modal-close" onclick="closeAllModals()">✕</div>
        <h3 style="font-size:20px; margin-bottom:8px;">預約書籍</h3>
        <p id="reserveBookTitle" style="color:var(--primary); font-weight:600; margin-bottom:20px;"></p>
        <input type="text" id="reserveClass" class="input-field" placeholder="輸入班級 (例: 初三1)">
        <input type="text" id="reserveName" class="input-field" placeholder="輸入姓名">
        <input type="hidden" id="reserveBookId">
        <button class="btn-primary" style="width:100%; margin-top:10px;" onclick="submitReserve()">確認預約</button>
    </div>

    <div class="modal-center" id="recommendModal">
        <div class="modal-close" onclick="closeAllModals()">✕</div>
        <h3 style="font-size:20px; margin-bottom:20px;">推薦好書給圖書館</h3>
        <input type="text" id="recName" class="input-field" placeholder="推薦書名">
        <textarea id="recReason" class="input-field" placeholder="推薦理由 (選填)"
            style="height:100px; resize:none;"></textarea>
        <button class="btn-primary" style="width:100%; margin-top:10px;" onclick="submitRecommend()">送出推薦</button>
    </div>

    <div class="bottom-sheet" id="commentSheet">
        <div class="bs-handle"></div>
        <h3 id="commentBookTitle" style="font-size:18px; margin-bottom:16px;"></h3>
        <div style="position:relative; margin-bottom:20px;">
            <input type="text" id="commentInput" class="input-field" placeholder="留下你的評論..."
                style="padding-right:80px; margin-bottom:0;">
            <button
                style="position:absolute; right:8px; top:50%; transform:translateY(-50%); background:var(--primary); color:white; border-radius:100px; padding:6px 12px; font-weight:bold;"
                onclick="submitComment()">發佈</button>
            <input type="hidden" id="commentBookId">
        </div>
        <div id="commentList" style="display:flex; flex-direction:column;"></div>
    </div>

</body>

</html>
